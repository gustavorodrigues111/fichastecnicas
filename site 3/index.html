<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fichas Técnicas — Consultoria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="#/" class="brand">
      <span class="brand-mark">—</span>
      <span class="brand-name">Fichas Técnicas</span>
    </a>
    <nav class="site-nav" id="site-nav">
      <a href="#/clientes" id="nav-clientes" data-nav="clientes" style="display:none">Restaurantes</a>
      <a href="#/admin/usuarios" id="nav-usuarios" data-nav="usuarios" style="display:none">Usuários</a>
      <button class="link-btn auth-btn" id="btn-auth">Entrar</button>
    </nav>
  </div>
</header>

<main id="app" class="container">
  <div class="loading-state">
    <p>Carregando…</p>
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <span>Consultoria gastronômica · Fichas técnicas</span>
    <span class="footer-actions">
      <button class="link-btn" id="btn-download-backup">Baixar backup do cliente</button>
    </span>
  </div>
</footer>

<!-- Login modal -->
<div id="login-modal" class="modal" hidden>
  <div class="modal-overlay"></div>
  <div class="modal-content">
    <h2>Entrar</h2>
    <p class="modal-subtitle">Acesso restrito</p>
    <form id="login-form">
      <label class="field">
        <span class="label-text">Email</span>
        <input type="email" id="login-email" required autocomplete="email" />
      </label>
      <label class="field">
        <span class="label-text">Senha</span>
        <input type="password" id="login-password" required autocomplete="current-password" />
      </label>
      <p id="login-error" class="login-error" hidden></p>
      <div class="modal-actions">
        <button type="button" class="btn" id="login-cancel">Cancelar</button>
        <button type="submit" class="btn btn-primary">Entrar</button>
      </div>
    </form>
  </div>
</div>

<div id="toast" class="toast" hidden></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
